name: Deploy to Azure
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: acrcaatejas.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    - name: Build and push container
      run: |
        docker build -t acrcaatejas.azurecr.io/app-caa-tejas:${{ github.sha }} .
        docker push acrcaatejas.azurecr.io/app-caa-tejas:${{ github.sha }}
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'app-caa-tejas'
        images: 'acrcaatejas.azurecr.io/app-caa-tejas:${{ github.sha }}'
